    maxInstances: 1
    ports: []
  mcp-medusa:
    displayName: Medusa MCP
    kind: mcp
    optional: true
    start: npx -y mcp-medusa
    stop: pkill -f "mcp-medusa"
    match:
      - mcp-medusa
    maxInstances: 1
    ports: []
  adobe-express-mcp:
    displayName: Adobe Express MCP
    kind: mcp
    optional: true
    start: npx -y adobe-express-add-on-mcp-server
    stop: pkill -f "adobe-express-add-on-mcp-server"
    match:
      - adobe-express-add-on-mcp-server
    maxInstances: 1
    ports: []
  comfyui-mcp:
    displayName: ComfyUI MCP
    kind: mcp
    optional: true
    start: npx -y comfyui-mcp
    stop: pkill -f "comfyui-mcp"
    match:
      - comfyui-mcp
    maxInstances: 1
    ports: []
